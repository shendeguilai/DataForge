name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test with H2 and PostgreSQL Testcontainers
        run: mvn --batch-mode verify
      - name: Validate production Compose
        env:
          POSTGRES_DB: dataforge
          POSTGRES_USER: dataforge
          POSTGRES_PASSWORD: ci-database-password
          DATAFORGE_POSTGRES_DIR: /tmp/dataforge/postgres
          DATAFORGE_RUNTIME_DIR_HOST: /tmp/dataforge/runtime
          DATAFORGE_BACKUP_DIR: /tmp/dataforge/backups
          DATAFORGE_MIGRATION_DIR: /tmp/dataforge/migration
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-admin-password
          INVITE_CODE: ci-invite-code
          DATAFORGE_SECRET: ci-encryption-secret-0123456789
        run: docker compose -f compose.prod.yml config >/dev/null
      - name: Build production image
        run: docker build -t dataforge:ci .
