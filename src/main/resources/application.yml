server:
  port: ${PORT:8080}
  compression:
    enabled: true

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/dataforge;AUTO_SERVER=TRUE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 4MB

dataforge:
  runtime-dir: ${DATAFORGE_RUNTIME_DIR:./runtime}
  process-stack-mb: ${DATAFORGE_PROCESS_STACK_MB:256}
  daily-generation-limit: ${DAILY_GENERATION_LIMIT:30}
  invite-code: ${INVITE_CODE:443322}
  atcoder:
    cookie: ${ATCODER_COOKIE:}
  quiz:
    countdown-seconds: ${QUIZ_COUNTDOWN_SECONDS:3}
    buzz-seconds: ${QUIZ_BUZZ_SECONDS:15}
    room-expiry-minutes: ${QUIZ_ROOM_EXPIRY_MINUTES:30}
    room-capacity: ${QUIZ_ROOM_CAPACITY:60}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123456}
  crypto-secret: ${DATAFORGE_SECRET:change-this-secret-before-production}
  ai:
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-v4-pro}
